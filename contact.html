 <main>
    <section class="contact-container">
        <h1>Contactez-moi</h1>
        
        <div class="contact-content">

                <h3>Mes coordonnées</h3>
                <p>📍 Basé à : <strong>Lubumbashi</strong></p>
                <p>📞 Téléphone : <a href="tel:+243992815778">0992815778</a></p>

                    <span class="badge whatsapp">WhatsApp</span>
                    <span class="badge telegram">Telegram</span>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="nom">Nom complet</label>
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="tel">Téléphone</label>
                    <input type="tel" id="tel" name="tel" placeholder="Votre numéro" required>
                </div>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </div>
    </section>
